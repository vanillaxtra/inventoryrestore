name: ${project.name}
main: ${project.groupId}.InventoryRestore
version: ${project.version}
description: ${project.description}
author: ${project.organization.name}
authors: [${project.organization.name}]
api-version: 1.13

loadbefore:
  - DeluxeCombat
  - DeadChest
  - AngelChest
  - SavageDeathChest

commands:
  inventoryrestore:
    description: ${project.description}
    usage: /ir <subcommand>
    aliases: [ir]

permissions:
  inventoryrestore.*:
    description: Gives access to all InventoryRestore commands.
    children:
      inventoryrestore.cmd: true
      inventoryrestore.deathsave: true
      inventoryrestore.joinsave: true
      inventoryrestore.leavesave: true
      inventoryrestore.worldchangesave: true
      inventoryrestore.enable: true
      inventoryrestore.disable: true
      inventoryrestore.reload: true
      inventoryrestore.restore: true
      inventoryrestore.forcebackup: true
      inventoryrestore.version: true
      inventoryrestore.help: true
      inventoryrestore.adminalerts: true
      inventoryrestore.viewbackups: true
    default: op
  inventoryrestore.cmd:
    description: Allows InventoryRestore commands to work.
    default: true
  inventoryrestore.deathsave:
    description: Player inventories will be saved when they die.
    default: true
  inventoryrestore.joinsave:
    description: Player inventories will be saved when they join.
    default: true
  inventoryrestore.leavesave:
    description: Player inventories will be saved when they leave.
    default: true
  inventoryrestore.worldchangesave:
    description: Player inventories will be saved when they change worlds.
    default: true
  inventoryrestore.enable:
    description: Grants access to enable the plugin globally.
    default: op
  inventoryrestore.disable:
    description: Grants access to disable the plugin globally.
    default: op
  inventoryrestore.reload:
    description: Grants access to reload the plugin configuration.
    default: op
  inventoryrestore.restore:
    description: Grants access to perform player roll backs.
    default: op
    children:
      inventoryrestore.viewbackups: true
      inventoryrestore.restore.teleport:
        default: op
        description: Allow the staff member to teleport to the location where the backup was saved
  inventoryrestore.forcebackup:
    description: Forces a backup for an online player.
    default: op
  inventoryrestore.viewbackups:
    description: Allows player to view player backups but can't take items from the backups or restore the target's inventory
    default: op
  inventoryrestore.adminalerts:
    description: Allows player to receive extra notifications related to the plugin when joining.
    default: op
  inventoryrestore.version:
    description: Allows player to see the version the plugin is running on the server.
    default: true
  inventoryrestore.help:
    description: Get the list of commands and what they do
    default: true

